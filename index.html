<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>IMU Tester</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#eee;
margin:0;
}

.container{
padding:10px;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

button{
font-size:18px;
padding:10px 15px;
}

.timer{
font-size:24px;
background:#ddd;
padding:10px;
}

table{
border-collapse:collapse;
background:#ddd;
margin:auto;
width:95%;
}

td,th{
border:1px solid #bbb;
padding:8px;
}

meter{
width:90%;
height:25px;
}

</style>
</head>

<body>

<div class="container">

<div class="top">

<button id="mainButton">計測の開始</button>

<div class="timer" id="timer">
10:00:00
</div>

</div>

<table>

<tr>
<th></th>
<th>X</th>
<th>Y</th>
<th>Z</th>
</tr>

<tr>
<td>加速度 (m/s²)</td>

<td>
<div id="ax_val">0</div>
<meter id="ax_meter" min="-20" max="20" value="0"></meter>
</td>

<td>
<div id="ay_val">0</div>
<meter id="ay_meter" min="-20" max="20" value="0"></meter>
</td>

<td>
<div id="az_val">0</div>
<meter id="az_meter" min="-20" max="20" value="0"></meter>
</td>

</tr>

<tr>
<td>角速度 (deg/s)</td>

<td>
<div id="gx_val">0</div>
<meter id="gx_meter" min="-500" max="500" value="0"></meter>
</td>

<td>
<div id="gy_val">0</div>
<meter id="gy_meter" min="-500" max="500" value="0"></meter>
</td>

<td>
<div id="gz_val">0</div>
<meter id="gz_meter" min="-500" max="500" value="0"></meter>
</td>

</tr>

</table>

</div>

<script>

window.addEventListener("devicemotion",(e)=>{

let ax=e.accelerationIncludingGravity.x||0
let ay=e.accelerationIncludingGravity.y||0
let az=e.accelerationIncludingGravity.z||0

let gx=e.rotationRate.alpha||0
let gy=e.rotationRate.beta||0
let gz=e.rotationRate.gamma||0

document.getElementById("ax_val").innerText=ax.toFixed(2)
document.getElementById("ay_val").innerText=ay.toFixed(2)
document.getElementById("az_val").innerText=az.toFixed(2)

document.getElementById("gx_val").innerText=gx.toFixed(2)
document.getElementById("gy_val").innerText=gy.toFixed(2)
document.getElementById("gz_val").innerText=gz.toFixed(2)

document.getElementById("ax_meter").value=ax
document.getElementById("ay_meter").value=ay
document.getElementById("az_meter").value=az

document.getElementById("gx_meter").value=gx
document.getElementById("gy_meter").value=gy
document.getElementById("gz_meter").value=gz

})

</script>

</body>
</html>
