<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Smartphone IMU Viewer</title>

<style>

body{
font-family:sans-serif;
background:#f0f0f0;
margin:0;
padding:3vw;
}

.container{
width:100%;
max-width:100%;
}

h2{
margin-top:6vw;
margin-bottom:2vw;
font-size:6vw;
}

.row{
display:flex;
align-items:center;
margin:2vw 0;
background:#ddd;
padding:2vw;
border-radius:2vw;
}

.label{
width:8vw;
font-weight:bold;
font-size:5vw;
}

.value{
width:22vw;
text-align:right;
margin-right:3vw;
font-family:monospace;
font-size:5vw;
}

meter{
flex-grow:1;
height:5vw;
}

</style>

</head>

<body>

<div class="container">

<h2>加速度 (m/s²)</h2>

<div class="row">
<div class="label">X</div>
<div class="value" id="ax_val">0</div>
<meter id="ax_meter" min="-20" max="20" value="0"></meter>
</div>

<div class="row">
<div class="label">Y</div>
<div class="value" id="ay_val">0</div>
<meter id="ay_meter" min="-20" max="20" value="0"></meter>
</div>

<div class="row">
<div class="label">Z</div>
<div class="value" id="az_val">0</div>
<meter id="az_meter" min="-20" max="20" value="0"></meter>
</div>

<h2>角速度 (deg/s)</h2>

<div class="row">
<div class="label">X</div>
<div class="value" id="gx_val">0</div>
<meter id="gx_meter" min="-500" max="500" value="0"></meter>
</div>

<div class="row">
<div class="label">Y</div>
<div class="value" id="gy_val">0</div>
<meter id="gy_meter" min="-500" max="500" value="0"></meter>
</div>

<div class="row">
<div class="label">Z</div>
<div class="value" id="gz_val">0</div>
<meter id="gz_meter" min="-500" max="500" value="0"></meter>
</div>

</div>

<script>

async function requestPermission(){

if(typeof DeviceMotionEvent.requestPermission==="function"){
try{
await DeviceMotionEvent.requestPermission()
}catch(e){}
}

}

requestPermission()

window.addEventListener("devicemotion",(e)=>{

let ax=e.accelerationIncludingGravity.x||0
let ay=e.accelerationIncludingGravity.y||0
let az=e.accelerationIncludingGravity.z||0

let gx=e.rotationRate.alpha||0
let gy=e.rotationRate.beta||0
let gz=e.rotationRate.gamma||0

update("ax",ax)
update("ay",ay)
update("az",az)

update("gx",gx)
update("gy",gy)
update("gz",gz)

})

function update(prefix,val){

document.getElementById(prefix+"_val").innerText=val.toFixed(3)
document.getElementById(prefix+"_meter").value=val

}

</script>

</body>
</html>
