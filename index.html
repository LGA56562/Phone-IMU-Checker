<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>IMU Tester</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#eee;
margin:0;
}

.container{
margin:auto;
padding:10px;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

button{
font-size:18px;
padding:10px 15px;
}

.timer{
font-size:24px;
background:#ddd;
padding:10px;
}

table{
border-collapse:collapse;
background:#ddd;
margin:auto;
}

td,th{
border:1px solid #bbb;
padding:8px;
}

.graph{
background:#ccc;
margin-top:15px;
padding:5px;
}

canvas{
background:white;
}

</style>
</head>

<body>

<div class="container" id="container">

<div class="top">

<button id="mainButton">計測の開始</button>

<div class="timer" id="timer">
10:00:00
</div>

</div>

<table id="paramTable">

<tr>
<th></th>
<th>X</th>
<th>Y</th>
<th>Z</th>
</tr>

<tr>
<td>加速度 (m/s²)</td>
<td id="ax">0</td>
<td id="ay">0</td>
<td id="az">0</td>
</tr>

<tr>
<td>角速度 (deg/s)</td>
<td id="gx">0</td>
<td id="gy">0</td>
<td id="gz">0</td>
</tr>

</table>

<div class="graph">
加速度グラフ（10分）
<canvas id="accChart"></canvas>
</div>

<div class="graph">
角速度グラフ（10分）
<canvas id="gyroChart"></canvas>
</div>

</div>

<script>

const duration=600000
const recordInterval=12000

let state="idle"
let startTime=0
let lastRecord=0
let log=[]

let currentSensor={
ax:0,ay:0,az:0,
gx:0,gy:0,gz:0
}

const button=document.getElementById("mainButton")
const timer=document.getElementById("timer")

function resizeUI(){

let w=window.innerWidth*0.95

document.getElementById("paramTable").style.width=w+"px"

document.querySelectorAll("canvas").forEach(c=>{
c.width=w
c.height=w*0.45
})

}

resizeUI()
window.addEventListener("resize",resizeUI)

function format(ms){

let remain=Math.max(0,duration-ms)

let m=Math.floor(remain/60000)
let s=Math.floor(remain%60000/1000)
let ms2=Math.floor(remain%1000/10)

return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}:${String(ms2).padStart(2,'0')}`

}

button.onclick=async()=>{

if(state==="idle"){

if(typeof DeviceMotionEvent.requestPermission==="function"){
await DeviceMotionEvent.requestPermission()
}

state="recording"
startTime=Date.now()
lastRecord=0
log=[]

button.innerText="リセット"

}

else if(state==="recording"){

reset()

}

else if(state==="done"){

downloadCSV()

}

}

function reset(){

state="idle"
button.innerText="計測の開始"
timer.innerText="10:00:00"

log=[]

accChart.data.datasets.forEach(d=>d.data=[])
gyroChart.data.datasets.forEach(d=>d.data=[])

accChart.update()
gyroChart.update()

}

function downloadCSV(){

let csv="time,ax,ay,az,gx,gy,gz\n"

log.forEach(d=>{
csv+=`${d.t},${d.ax},${d.ay},${d.az},${d.gx},${d.gy},${d.gz}\n`
})

let blob=new Blob([csv])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="imu_log.csv"
a.click()

}

const accChart=new Chart(document.getElementById("accChart"),{

type:"line",

data:{
datasets:[
{label:"X",borderColor:"red",data:[],parsing:false},
{label:"Y",borderColor:"green",data:[],parsing:false},
{label:"Z",borderColor:"blue",data:[],parsing:false}
]
},

options:{
animation:false,
scales:{
x:{type:"linear",min:0,max:600},
y:{}
}
}

})

const gyroChart=new Chart(document.getElementById("gyroChart"),{

type:"line",

data:{
datasets:[
{label:"X",borderColor:"red",data:[],parsing:false},
{label:"Y",borderColor:"green",data:[],parsing:false},
{label:"Z",borderColor:"blue",data:[],parsing:false}
]
},

options:{
animation:false,
scales:{
x:{type:"linear",min:0,max:600},
y:{}
}
}

})

window.addEventListener("devicemotion",(e)=>{

currentSensor.ax=e.accelerationIncludingGravity.x||0
currentSensor.ay=e.accelerationIncludingGravity.y||0
currentSensor.az=e.accelerationIncludingGravity.z||0

currentSensor.gx=e.rotationRate.alpha||0
currentSensor.gy=e.rotationRate.beta||0
currentSensor.gz=e.rotationRate.gamma||0

document.getElementById("ax").innerText=currentSensor.ax.toFixed(3)
document.getElementById("ay").innerText=currentSensor.ay.toFixed(3)
document.getElementById("az").innerText=currentSensor.az.toFixed(3)

document.getElementById("gx").innerText=currentSensor.gx.toFixed(3)
document.getElementById("gy").innerText=currentSensor.gy.toFixed(3)
document.getElementById("gz").innerText=currentSensor.gz.toFixed(3)

})

function update(){

if(state!=="recording") return

let elapsed=Date.now()-startTime

timer.innerText=format(elapsed)

if(elapsed-lastRecord>recordInterval){

lastRecord=elapsed

let t=elapsed/1000

let d={
t,
...currentSensor
}

log.push(d)

accChart.data.datasets[0].data.push({x:t,y:d.ax})
accChart.data.datasets[1].data.push({x:t,y:d.ay})
accChart.data.datasets[2].data.push({x:t,y:d.az})

gyroChart.data.datasets[0].data.push({x:t,y:d.gx})
gyroChart.data.datasets[1].data.push({x:t,y:d.gy})
gyroChart.data.datasets[2].data.push({x:t,y:d.gz})

accChart.update()
gyroChart.update()

}

if(elapsed>=duration){

state="done"
button.innerText="データダウンロード"

}

}

setInterval(update,50)

</script>

</body>
</html>
