<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Smartphone IMU Tester</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#eee;
}

.container{
width:360px;
margin:auto;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

button{
font-size:18px;
padding:10px;
}

.timer{
font-size:24px;
background:#ddd;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
background:#ddd;
}

td,th{
border:1px solid #bbb;
padding:10px;
}

.graph{
background:#ccc;
margin-top:20px;
padding:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="top">

<button id="mainButton">計測の開始</button>

<div class="timer" id="timer">
10:00:00
</div>

</div>

<table>

<tr>
<th></th>
<th>X</th>
<th>Y</th>
<th>Z</th>
</tr>

<tr>
<td>加速度 (m/s²)</td>
<td id="ax">0</td>
<td id="ay">0</td>
<td id="az">0</td>
</tr>

<tr>
<td>角速度 (deg/s)</td>
<td id="gx">0</td>
<td id="gy">0</td>
<td id="gz">0</td>
</tr>

</table>

<div class="graph">
加速度グラフ（10分）
<canvas id="accChart"></canvas>
</div>

<div class="graph">
角速度グラフ（10分）
<canvas id="gyroChart"></canvas>
</div>

</div>

<script>

const duration=600000

let state="idle"
let startTime=0
let log=[]

const button=document.getElementById("mainButton")
const timer=document.getElementById("timer")

function format(ms){

let remain=Math.max(0,duration-ms)

let m=Math.floor(remain/60000)
let s=Math.floor(remain%60000/1000)
let ms2=Math.floor(remain%1000/10)

return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}:${String(ms2).padStart(2,'0')}`

}

button.onclick=async()=>{

if(state==="idle"){

if(typeof DeviceMotionEvent.requestPermission==="function"){
await DeviceMotionEvent.requestPermission()
}

state="recording"
startTime=Date.now()
log=[]

button.innerText="リセット"

}

else if(state==="recording"){

state="idle"
button.innerText="計測の開始"
timer.innerText="10:00:00"
log=[]

}

else if(state==="done"){

downloadCSV()

}

}

function downloadCSV(){

let csv="time,ax,ay,az,gx,gy,gz\n"

log.forEach(d=>{
csv+=`${d.t},${d.ax},${d.ay},${d.az},${d.gx},${d.gy},${d.gz}\n`
})

let blob=new Blob([csv])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="imu_log.csv"
a.click()

}

const accChart=new Chart(document.getElementById("accChart"),{
type:"line",
data:{
datasets:[
{label:"ax",borderColor:"red",data:[],parsing:false},
{label:"ay",borderColor:"green",data:[],parsing:false},
{label:"az",borderColor:"blue",data:[],parsing:false}
]
},
options:{
animation:false,
scales:{
x:{type:"linear",min:0,max:600},
y:{}
}
}
})

const gyroChart=new Chart(document.getElementById("gyroChart"),{
type:"line",
data:{
datasets:[
{label:"gx",borderColor:"red",data:[],parsing:false},
{label:"gy",borderColor:"green",data:[],parsing:false},
{label:"gz",borderColor:"blue",data:[],parsing:false}
]
},
options:{
animation:false,
scales:{
x:{type:"linear",min:0,max:600},
y:{}
}
}
})

window.addEventListener("devicemotion",(e)=>{

let ax=e.accelerationIncludingGravity.x||0
let ay=e.accelerationIncludingGravity.y||0
let az=e.accelerationIncludingGravity.z||0

let gx=e.rotationRate.alpha||0
let gy=e.rotationRate.beta||0
let gz=e.rotationRate.gamma||0

document.getElementById("ax").innerText=ax.toFixed(3)
document.getElementById("ay").innerText=ay.toFixed(3)
document.getElementById("az").innerText=az.toFixed(3)

document.getElementById("gx").innerText=gx.toFixed(3)
document.getElementById("gy").innerText=gy.toFixed(3)
document.getElementById("gz").innerText=gz.toFixed(3)

if(state!=="recording") return

let t=(Date.now()-startTime)/1000

log.push({t,ax,ay,az,gx,gy,gz})

accChart.data.datasets[0].data.push({x:t,y:ax})
accChart.data.datasets[1].data.push({x:t,y:ay})
accChart.data.datasets[2].data.push({x:t,y:az})

gyroChart.data.datasets[0].data.push({x:t,y:gx})
gyroChart.data.datasets[1].data.push({x:t,y:gy})
gyroChart.data.datasets[2].data.push({x:t,y:gz})

accChart.update("none")
gyroChart.update("none")

})

function updateTimer(){

if(state!=="recording") return

let elapsed=Date.now()-startTime

timer.innerText=format(elapsed)

if(elapsed>=duration){

state="done"
button.innerText="データダウンロード"

}

}

setInterval(updateTimer,10)

</script>

</body>
</html>
